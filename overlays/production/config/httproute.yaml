apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  name: drova-login
  namespace: drova
spec:
  parentRefs:
    - name: envoy-gateway
      namespace: gateway
      sectionName: https
  hostnames:
    - "drova.timourhomelab.org"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1/users/login
        - path:
            type: PathPrefix
            value: /v1/users/register
        - path:
            type: PathPrefix
            value: /v1/auth
      filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            add:
              - name: X-Frame-Options
                value: DENY
              - name: X-Content-Type-Options
                value: nosniff
              - name: Strict-Transport-Security
                value: "max-age=31536000; includeSubDomains"
              - name: X-XSS-Protection
                value: "1; mode=block"
              - name: Referrer-Policy
                value: strict-origin-when-cross-origin
      backendRefs:
        - name: api-gateway
          port: 8081
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  name: drova-api
  namespace: drova
spec:
  parentRefs:
    - name: envoy-gateway
      namespace: gateway
      sectionName: https
  hostnames:
    - "drova.timourhomelab.org"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /ws/chat
      backendRefs:
        - name: chat-service
          port: 8084
    - matches:
        - path:
            type: PathPrefix
            value: /v1
        - path:
            type: PathPrefix
            value: /trip
        - path:
            type: PathPrefix
            value: /trips
        - path:
            type: PathPrefix
            value: /ws/drivers
        - path:
            type: PathPrefix
            value: /ws/riders
        - path:
            type: PathPrefix
            value: /webhook
        - path:
            type: Exact
            value: /health
        - path:
            type: Exact
            value: /readyz
        - path:
            type: Exact
            value: /config
      filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            add:
              - name: X-Frame-Options
                value: DENY
              - name: X-Content-Type-Options
                value: nosniff
              - name: Strict-Transport-Security
                value: "max-age=31536000; includeSubDomains"
              - name: X-XSS-Protection
                value: "1; mode=block"
              - name: Referrer-Policy
                value: strict-origin-when-cross-origin
      backendRefs:
        - name: api-gateway
          port: 8081
---
