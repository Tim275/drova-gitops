# Coraza WAF (OWASP CRS) as Envoy WASM filter — per-route targeting.
# Targets only HTTP routes; drova-ws stays WAF-free (WASM breaks WS upgrades,
# the reason the gateway-wide attempt in talos-homelab was disabled).
# Phase 1: SecRuleEngine DetectionOnly — logs only, blocks nothing.
# Detections land in the Envoy access logs -> Vector -> Elasticsearch
# (logs-envoy-access.*). After a clean soak: switch to "On" per route.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyExtensionPolicy
metadata:
  name: coraza-waf
  namespace: drova
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: drova-login
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: drova-api
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: drova-frontend
  wasm:
    - name: coraza
      rootID: coraza
      failOpen: true
      code:
        type: Image
        image:
          url: ghcr.io/corazawaf/coraza-proxy-wasm:0.6.0
      config: |
        {
          "directives_map": {
            "default": [
              "SecRuleEngine DetectionOnly",
              "SecRequestBodyAccess On",
              "SecRequestBodyLimit 13107200",
              "SecRequestBodyNoFilesLimit 131072",
              "SecResponseBodyAccess Off",
              "SecDebugLogLevel 0",
              "Include @owasp_crs/crs-setup.conf.example",
              "Include @owasp_crs/rules/*.conf"
            ]
          },
          "default_directives": "default"
        }
