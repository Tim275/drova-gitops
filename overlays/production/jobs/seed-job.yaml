apiVersion: batch/v1
kind: Job
metadata:
  name: drova-seed-users
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-options: Replace=true,ServerSideApply=false
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 26
        runAsGroup: 26
        fsGroup: 26
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: seed
          image: ghcr.io/cloudnative-pg/postgresql:16.4
          command: ["/bin/sh", "-c"]
          args:
            # Password is bcrypt-hashed in-DB via pgcrypto (bf, cost 12) — the
            # plaintext comes from the SEED_PASSWORD Sealed Secret and never
            # touches git. psql ':'pw'' binding is injection-safe. ON CONFLICT
            # UPDATE rotates existing rows, so the public "Test1234!" stops
            # working as soon as this runs. crypt('$2a$12$') is verifiable by
            # Go's bcrypt at login.
            - |
              psql "$DB_URL" -v pw="$SEED_PASSWORD" <<'ENDSQL'
              CREATE EXTENSION IF NOT EXISTS pgcrypto;
              INSERT INTO users (email, password_hash, role, is_activated, display_name, phone)
              VALUES
                ('rider@drova.local',  crypt(:'pw', gen_salt('bf', 12)), 'rider',  true, 'Max Rider',     '+49 123 4567890'),
                ('driver@drova.local', crypt(:'pw', gen_salt('bf', 12)), 'driver', true, 'Stefan Fahrer', '+49 987 6543210')
              ON CONFLICT (email) DO UPDATE SET password_hash = EXCLUDED.password_hash;
              ENDSQL
          env:
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: drova-pg-users-creds
                  key: DB_URL
            - name: SEED_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: drova-seed-secret
                  key: SEED_PASSWORD
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
