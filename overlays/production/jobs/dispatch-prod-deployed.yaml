# PostSync: repository_dispatch an drova → prod-verify (Health-Poll + Auto-Rollback)
apiVersion: batch/v1
kind: Job
metadata:
  name: drova-dispatch-prod-deployed
  annotations:
    argocd.argoproj.io/sync-wave: "100"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-options: Replace=true,ServerSideApply=false
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: dispatch
          image: curlimages/curl:8.10.1
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          env:
            - name: GH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: drova-dispatch-token
                  key: GH_TOKEN
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              TIMESTAMP=$(date -u +%FT%TZ)
              echo "Sending production-deployed event @ ${TIMESTAMP}"
              curl -sf -X POST \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer ${GH_TOKEN}" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "https://api.github.com/repos/Tim275/drova/dispatches" \
                -d '{"event_type":"production-deployed","client_payload":{"deployed_at":"'"${TIMESTAMP}"'"}}' \
                && echo "✓ dispatch sent — drova/prod-verify.yaml will run health-poll + auto-rollback"
          resources:
            requests:
              cpu: 20m          # drova LimitRange min: 20m
              memory: 64Mi      # drova LimitRange min: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi     # bumped to fit LimitRange max-ratio
