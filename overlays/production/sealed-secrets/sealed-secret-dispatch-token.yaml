## PAT zur Authentifizierung beim drova/dispatches API endpoint.
##
## ⚠️  PLACEHOLDER — bitte echte sealed-secret committen vor merge:
##
## SETUP:
## 1. PAT erstellen: https://github.com/settings/personal-access-tokens/new
##    - Resource owner:     Tim275
##    - Repository access:  Only Tim275/drova
##    - Expiration:          90 Tage (Kalender-Reminder!)
##    - Permissions:
##      • Contents:                      Read-only
##      • Metadata:                      Read-only
##      • Repository dispatch:           Write     ← KEY permission
##
## 2. Sealen mit unserem talos-homelab cert:
##    CERT=~/Desktop/kubecraft/mealie/homelabtm/taloshomelab/talos-homelab-scratch/tofu/bootstrap/sealed-secrets/certificate/sealed-secrets.crt
##    kubectl create secret generic drova-dispatch-token \
##      --namespace=drova \
##      --from-literal=GH_TOKEN="github_pat_..." \
##      --dry-run=client -o yaml | \
##      kubeseal --cert "$CERT" --format yaml --scope strict \
##      > overlays/production/sealed-secrets/sealed-secret-dispatch-token.yaml
##
## 3. git commit + push
##
## Diese placeholder-Datei BLOCKIERT den ArgoCD-sync mit "Secret not found"
## bis du Schritt 2 oben gemacht hast.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: drova-dispatch-token
  namespace: drova
spec:
  encryptedData:
    GH_TOKEN: REPLACE_ME_WITH_SEALED_PAT
  template:
    metadata:
      name: drova-dispatch-token
      namespace: drova
    type: Opaque
