apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: drova-staging
resources:
  - ../../base
  - app-config.yaml
  - httproute.yaml
  - sealed-secrets/sealed-secret-app.yaml
  - sealed-secrets/sealed-secret-pg-app-creds.yaml
  - sealed-secrets/sealed-secret-pg-users-creds.yaml
  - sealed-secrets/sealed-secret-pg-trips-creds.yaml
  - sealed-secrets/sealed-secret-pg-payments-creds.yaml
  - sealed-secrets/sealed-secret-redis.yaml
images:
  - name: ghcr.io/tim275/drova/api-gateway
    newTag: latest
  - name: ghcr.io/tim275/drova/user-service
    newTag: latest
  - name: ghcr.io/tim275/drova/trip-service
    newTag: latest
  - name: ghcr.io/tim275/drova/driver-service
    newTag: latest
  - name: ghcr.io/tim275/drova/payment-service
    newTag: latest
  - name: ghcr.io/tim275/drova/chat-service
    newTag: latest
commonLabels:
  app.kubernetes.io/name: drova
  app.kubernetes.io/part-of: drova
  environment: staging
  team: timour
