apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
# Shared hardened security baseline for the 6 Go services (NOT frontend — nginx
# runs as uid 101 with a writable root FS). Pod runs non-root as uid 65532; the
# app container drops all caps and gets a read-only root FS. Patching
# containers/0 by index keeps this container-name-agnostic across services; the
# Rollout target covers api-gateway (canary), the Deployment target the rest.
patches:
  - target:
      kind: Deployment
    patch: |-
      - op: add
        path: /spec/template/spec/securityContext
        value:
          runAsNonRoot: true
          runAsUser: 65532
          runAsGroup: 65532
      - op: add
        path: /spec/template/spec/containers/0/securityContext
        value:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
  - target:
      kind: Rollout
    patch: |-
      - op: add
        path: /spec/template/spec/securityContext
        value:
          runAsNonRoot: true
          runAsUser: 65532
          runAsGroup: 65532
      - op: add
        path: /spec/template/spec/containers/0/securityContext
        value:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
