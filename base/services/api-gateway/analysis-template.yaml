---
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: '3'
  name: success-rate
spec:
  args:
    - name: service-name
  metrics:
    # Homelab-tuned: initialDelay 240s skips slow cold-start warmup, failureLimit 4
    # tolerates transient histogram_quantile spikes during traffic shifts. Steady-state
    # p99 is ~25ms and success ~100%, so these still guard real regressions — not
    # deploy-time noise (which was aborting healthy canaries and stalling api-gateway).
    - name: success-rate
      initialDelay: 240s
      interval: 30s
      count: 5
      successCondition: "len(result) > 0 && result[0] >= 0.99"
      failureCondition: "len(result) > 0 && result[0] < 0.95"
      failureLimit: 4
      inconclusiveLimit: 3
      provider:
        prometheus:
          address: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
          query: |
            sum(rate(
              http_server_request_duration_seconds_count{
                service_name="{{args.service-name}}",
                http_response_status_code!~"5.."
              }[2m]
            ))
            /
            sum(rate(
              http_server_request_duration_seconds_count{
                service_name="{{args.service-name}}"
              }[2m]
            ))
    - name: p99-latency
      initialDelay: 240s
      interval: 30s
      count: 5
      successCondition: "len(result) > 0 && result[0] < 1.5"
      failureCondition: "len(result) > 0 && result[0] >= 2.5"
      failureLimit: 4
      inconclusiveLimit: 3
      provider:
        prometheus:
          address: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
          query: |
            histogram_quantile(0.99,
              sum by (le) (rate(
                http_server_request_duration_seconds_bucket{
                  service_name="{{args.service-name}}"
                }[3m]
              ))
            )
