---
## Argo-Rollouts Canary Strategy for api-gateway
##
## How Canary works (replica-based, no service-mesh):
##   1. setWeight: 20 → 20% of replicas (1 of 5) run v-new
##   2. pause 3min → AnalysisTemplate prüft Prometheus-SLI
##   3. setWeight: 50 → 50% replicas run v-new
##   4. pause 3min → AnalysisTemplate
##   5. setWeight: 100 → all replicas run v-new
##
## AnalysisTemplate prüft alle 30s:
##   - 5xx-error-rate < 1% (success-condition)
##   - p99-latency < 1s
## Wenn 2 Messungen FAIL → automatic abort + rollback to stable
##
## Manual control via:
##   kubectl argo rollouts get rollout api-gateway -n drova --watch
##   kubectl argo rollouts promote api-gateway -n drova       # skip pause
##   kubectl argo rollouts abort api-gateway -n drova         # rollback
##   kubectl argo rollouts set image api-gateway api-gateway=<new-tag>
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: '3'
  name: api-gateway
spec:
  replicas: 5    # 5 replicas = 20%-Steps (1 pod = 20% traffic)
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: api-gateway
  strategy:
    canary:
      ## Services für Traffic-Split (replica-based without service-mesh)
      canaryService: api-gateway-canary       # only canary-pods
      stableService: api-gateway-stable       # only stable-pods
      ## "api-gateway" Service (existing) selects ALL pods → main entry-point
      ##
      ## Optional: nach erfolgreichem Canary scale stable down + canary up
      scaleDownDelaySeconds: 30
      maxSurge: 1                              # max 1 extra Pod während rollout
      maxUnavailable: 0                        # nie unavailable

      steps:
        ## Schritt 1: 20% Traffic auf neue Version
        - setWeight: 20
        - pause:
            duration: 3m                       # 3min beobachten

        ## Schritt 2: PromQL-Check via AnalysisTemplate
        - analysis:
            templates:
              - templateName: success-rate
            args:
              - name: service-name
                value: api-gateway

        ## Schritt 3: 50% Traffic
        - setWeight: 50
        - pause:
            duration: 3m

        ## Schritt 4: nochmaliger Check
        - analysis:
            templates:
              - templateName: success-rate
            args:
              - name: service-name
                value: api-gateway

        ## Schritt 5: 80% Traffic
        - setWeight: 80
        - pause:
            duration: 2m

        ## Schritt 6: 100% (rollout done)
        ## NOTE: setWeight 100 happens automatically after last step

  template:
    metadata:
      labels:
        app: api-gateway
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/port: '8081'
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
      volumes:
        - name: kafka-ca
          secret:
            secretName: drova-kafka-cluster-ca-cert
            items:
              - key: ca.crt
                path: ca.crt
      containers:
        - name: api-gateway
          image: ghcr.io/tim275/drova/api-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            - name: HTTP_ADDR
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: GATEWAY_HTTP_ADDR
            - name: TRIP_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: TRIP_SERVICE_URL
            - name: DRIVER_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DRIVER_SERVICE_URL
            - name: USER_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: USER_SERVICE_URL
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: KAFKA_BROKERS
            - name: KAFKA_TLS_CA_CERT
              value: "/etc/kafka-tls/ca.crt"
            - name: KAFKA_SASL_MECHANISM
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: KAFKA_SASL_MECHANISM
            - name: KAFKA_SASL_USERNAME
              value: "drova-kafka-user"
            - name: KAFKA_SASL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: drova-kafka-user
                  key: password
            - name: OTEL_COLLECTOR_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: OTEL_COLLECTOR_ENDPOINT
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: REDIS_URL
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: ENVIRONMENT
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: drova-app-secrets
                  key: JWT_SECRET
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: drova-redis-secret
                  key: password
            - name: MAPBOX_PUBLIC_TOKEN
              valueFrom:
                secretKeyRef:
                  name: drova-app-secrets
                  key: MAPBOX_PUBLIC_TOKEN
            - name: STRIPE_WEBHOOK_KEY
              valueFrom:
                secretKeyRef:
                  name: drova-app-secrets
                  key: STRIPE_WEBHOOK_KEY
            - name: STRIPE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: drova-app-secrets
                  key: STRIPE_PUBLIC_KEY
            - name: SCHEMA_REGISTRY_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: SCHEMA_REGISTRY_URL
                  optional: true
          volumeMounts:
            - name: kafka-ca
              mountPath: "/etc/kafka-tls"
              readOnly: true
          readinessProbe:
            httpGet:
              path: "/health"
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: "/health"
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          lifecycle:
            preStop:
              exec:
                command:
                  - "/bin/sh"
                  - "-c"
                  - sleep 15
      terminationGracePeriodSeconds: 60
