apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  name: trip-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trip-service
  template:
    metadata:
      labels:
        app: trip-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
      volumes:
        - name: kafka-ca
          secret:
            secretName: drova-kafka-cluster-ca-cert
            items:
              - key: ca.crt
                path: ca.crt
      containers:
        - name: trip-service
          image: ghcr.io/tim275/drova/trip-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 9093
              name: grpc
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
              - ALL
          env:
            - name: GRPC_ADDR
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: TRIP_GRPC_ADDR
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: KAFKA_BROKERS
            - name: KAFKA_TLS_CA_CERT
              value: /etc/kafka-tls/ca.crt
            - name: KAFKA_SASL_MECHANISM
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: KAFKA_SASL_MECHANISM
            - name: KAFKA_SASL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: drova-kafka-secrets
                  key: KAFKA_SASL_USERNAME
            - name: KAFKA_SASL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: drova-kafka-secrets
                  key: KAFKA_SASL_PASSWORD
            - name: OTEL_COLLECTOR_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: OTEL_COLLECTOR_ENDPOINT
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: ENVIRONMENT
            - name: MIGRATIONS_PATH
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: MIGRATIONS_PATH
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: drova-pg-trips-creds
                  key: DB_URL
            - name: MAPBOX_TOKEN
              valueFrom:
                secretKeyRef:
                  name: drova-app-secrets
                  key: MAPBOX_TOKEN
            - name: SERVICE_REFERER
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: SERVICE_REFERER
            - name: USER_SERVICE_GRPC_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: USER_SERVICE_GRPC_URL
          volumeMounts:
            - name: kafka-ca
              mountPath: /etc/kafka-tls
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: 9093
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 9093
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: trip-service
spec:
  selector:
    app: trip-service
  ports:
    - name: grpc
      port: 9093
      targetPort: 9093
