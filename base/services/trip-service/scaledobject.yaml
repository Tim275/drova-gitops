apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: trip-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: trip-service
  minReplicaCount: 2    # HA floor
  maxReplicaCount: 15
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 300
        scaleUp:
          stabilizationWindowSeconds: 30
  triggers:
    # Kafka consumer-lag via Prometheus (kafka-exporter), threshold = Lag pro Replica
    - type: prometheus
      metadata:
        serverAddress: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
        query: sum(kafka_consumergroup_lag{consumergroup=~"trip-service-.*"})
        threshold: "50"
    # KEDA skaliert auf das Max beider Trigger
    - type: cpu
      metricType: Utilization
      metadata:
        value: "70"
