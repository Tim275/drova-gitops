apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: trip-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: trip-service
  minReplicaCount: 2    # HA floor — never scale below 2
  maxReplicaCount: 15
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 300
        scaleUp:
          stabilizationWindowSeconds: 30
  triggers:
    # Kafka consumer-group lag via kube-prometheus-stack (Strimzi kafka-exporter).
    # No SASL/TLS creds — reuses the existing Prometheus scrape. threshold = lag per replica.
    - type: prometheus
      metadata:
        serverAddress: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
        query: sum(kafka_consumergroup_lag{consumergroup=~"trip-service-.*"})
        threshold: "50"
    # Keep the CPU signal the HPA had — KEDA scales on the max of both triggers.
    - type: cpu
      metricType: Utilization
      metadata:
        value: "70"
