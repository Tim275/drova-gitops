---
# Dedizierte Workload-Identität (Zero-Trust-Baustein: unterscheidbare
# Identität pro Service ist Voraussetzung für L7-AuthZ/mTLS-Policies).
# automountServiceAccountToken: false — kein Drova-Service spricht mit der
# K8s-API; ohne gemounteten Token hat ein kompromittierter Pod keinen API-Zugriff.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: trip-service
automountServiceAccountToken: false
