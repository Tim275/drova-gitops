---
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: '3'
  name: user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      initContainers:
        - name: migrate
          image: ghcr.io/tim275/drova/user-service:latest
          command:
            - "/app/user-service"
            - migrate
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: drova-pg-users-creds
                  key: DB_URL
            - name: MIGRATIONS_PATH
              value: migrations
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
      containers:
        - name: user-service
          image: ghcr.io/tim275/drova/user-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
            - containerPort: 9091
              name: grpc
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          env:
            - name: HTTP_ADDR
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: USER_HTTP_ADDR
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: REDIS_URL
            - name: OTEL_COLLECTOR_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: OTEL_COLLECTOR_ENDPOINT
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: ENVIRONMENT
            - name: APP_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: APP_BASE_URL
            - name: MIGRATIONS_PATH
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: MIGRATIONS_PATH
            - name: SEED
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: SEED
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: drova-pg-users-creds
                  key: DB_URL
            - name: POOL_URL
              valueFrom:
                secretKeyRef:
                  name: drova-pg-users-creds
                  key: POOL_URL
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: drova-redis-secret
                  key: password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: drova-app-secrets
                  key: JWT_SECRET
            - name: SMTP_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: SMTP_HOST
            - name: SMTP_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: SMTP_PORT
            - name: SMTP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: drova-app-secrets
                  key: SMTP_USERNAME
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: drova-app-secrets
                  key: SMTP_PASSWORD
            - name: FROM_EMAIL
              valueFrom:
                secretKeyRef:
                  name: drova-app-secrets
                  key: FROM_EMAIL
          readinessProbe:
            httpGet:
              path: "/v1/health"
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: "/v1/health"
              port: 8082
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
          lifecycle:
            preStop:
              exec:
                command:
                  - "/bin/sh"
                  - "-c"
                  - sleep 15
      terminationGracePeriodSeconds: 60
