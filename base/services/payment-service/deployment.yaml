---
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: '3'
  name: payment-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      initContainers:
        - name: migrate
          image: ghcr.io/tim275/drova/payment-service:latest
          command:
            - "/app/payment-service"
            - migrate
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: drova-pg-payments-creds
                  key: DB_URL
            - name: MIGRATIONS_PATH
              value: migrations
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
      volumes:
        - name: kafka-ca
          secret:
            secretName: drova-kafka-cluster-ca-cert
            items:
              - key: ca.crt
                path: ca.crt
      containers:
        - name: payment-service
          image: ghcr.io/tim275/drova/payment-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8085
              name: health
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          env:
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: KAFKA_BROKERS
            - name: KAFKA_TLS_CA_CERT
              value: "/etc/kafka-tls/ca.crt"
            - name: KAFKA_SASL_MECHANISM
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: KAFKA_SASL_MECHANISM
            - name: KAFKA_SASL_USERNAME
              value: "drova-kafka-user"
            - name: KAFKA_SASL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: drova-kafka-user
                  key: password
            - name: OTEL_COLLECTOR_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: OTEL_COLLECTOR_ENDPOINT
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: ENVIRONMENT
            - name: MIGRATIONS_PATH
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: MIGRATIONS_PATH
            - name: STRIPE_CURRENCY
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: STRIPE_CURRENCY
            - name: STRIPE_SUCCESS_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: STRIPE_SUCCESS_URL
            - name: STRIPE_CANCEL_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: STRIPE_CANCEL_URL
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: drova-pg-payments-creds
                  key: DB_URL
            - name: POOL_URL
              valueFrom:
                secretKeyRef:
                  name: drova-pg-payments-creds
                  key: POOL_URL
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: drova-app-secrets
                  key: STRIPE_SECRET_KEY
            - name: PAYMENT_MODE
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: PAYMENT_MODE
            - name: APP_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: APP_BASE_URL
            - name: HEALTH_ADDR
              value: ":8085"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: kafka-ca
              mountPath: "/etc/kafka-tls"
              readOnly: true
          lifecycle:
            preStop:
              exec:
                command:
                  - "/bin/sh"
                  - "-c"
                  - sleep 15
          readinessProbe:
            httpGet:
              path: "/health"
              port: 8085
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: "/health"
              port: 8085
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
      terminationGracePeriodSeconds: 60
